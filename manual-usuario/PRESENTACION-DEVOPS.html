* { margin: 0; padding: 0; box-sizing: border-box; }
:root {

.nav-bar { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 100; background: rgba(15,25,35,0.9); padding: 8px 18px; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid var(--border); align-items: center; }

.nav-bar button:hover { background: var(--primary); }

.nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); cursor: pointer; transition: .3s; border: none; }
.nav-dot.active { background: var(--primary-light); width: 20px; border-radius: 4px; }
.nav-progress { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--primary-light), var(--accent)); z-index: 200; transition: width .3s; }
.print-btn { position: fixed; top: 16px; right: 16px; z-index: 101; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 600; }

<!-- SLIDE 3: SEGURIDAD - CÓDIGO -->
<section class="slide slide-content">
  <h2>🔒 Seguridad en el Código</h2>
  <p class="slide-subtitle">Protección a nivel de aplicación: autenticación JWT, autorización por roles, validación de datos</p>
  <div class="two-col">
    <div class="card">
      <h3>🛡️ Helmet + Rate Limiting <span class="badge badge-implemented">✅ CÓDIGO REAL</span></h3>
      <p><code>backend/server.js</code> - Cabeceras HTTP seguras y límite de peticiones</p>
      <pre><span class="kw">const</span> helmet = <span class="fn">require</span>(<span class="str">'helmet'</span>);
<span class="kw">const</span> rateLimit = <span class="fn">require</span>(<span class="str">'express-rate-limit'</span>);
app.<span class="fn">use</span>(helmet()); <span class="cm">// XSS, clickjacking, MIME sniffing</span>
<span class="kw">const</span> limiter = rateLimit({
  windowMs: 15 * 60 * 1000, max: 100 <span class="cm">// por IP</span>
});
app.<span class="fn">use</span>(<span class="str">'/api/'</span>, limiter);
<span class="kw">const</span> loginLimiter = rateLimit({
  windowMs: 15 * 60 * 1000, max: 5 <span class="cm">// 5 intentos</span>
});</pre>
      <div class="explanation"><strong>¿Qué hace y por qué?</strong> Helmet añade cabeceras HTTP como X-Content-Type-Options (evita MIME sniffing), X-Frame-Options (evita clickjacking) y X-XSS-Protection (protege contra cross-site scripting). El rate limiter evita ataques de fuerza bruta y DoS limitando a 100 peticiones por IP cada 15 minutos, y solo 5 intentos de login. <strong>Archivo real:</strong> backend/server.js líneas 35-55.</div>
    </div>
    <div class="card">
      <h3>🔑 JWT + Middleware de Roles <span class="badge badge-implemented">✅ CÓDIGO REAL</span></h3>
      <p><code>backend/server.js</code> - Control de acceso basado en roles (RBAC)</p>
      <pre><span class="kw">function</span> <span class="fn">authMiddleware</span>(rolesPermitidos = []) {
  <span class="kw">return</span> (req, res, next) => {
    <span class="kw">const</span> token = req.headers[<span class="str">'authorization'</span>]?.<span class="fn">split</span>(<span class="str">' '</span>)[1];
    <span class="kw">if</span> (!token) <span class="kw">return</span> res.<span class="fn">status</span>(401).<span class="fn">json</span>({error:<span class="str">'Token'</span>});
    <span class="kw">const</span> decoded = jwt.<span class="fn">verify</span>(token, JWT_SECRET);
    <span class="kw">const</span> user = queryOne(<span class="str">'SELECT * FROM usuarios WHERE id=?'</span>, [decoded.id]);
    <span class="kw">if</span> (!user) <span class="kw">return</span> res.<span class="fn">status</span>(401).<span class="fn">json</span>({error:<span class="str">'No válido'</span>});
    <span class="kw">if</span> (rolesPermitidos.length && !rolesPermitidos.<span class="fn">includes</span>(user.rol))
      <span class="kw">return</span> res.<span class="fn">status</span>(403).<span class="fn">json</span>({error:<span class="str">'Permisos'</span>});
    req.user = user; next();
  };
}
<span class="cm">// Cada ruta especifica roles permitidos:</span>
app.<span class="fn">get</span>(<span class="str">'/api/usuarios'</span>, authMiddleware([<span class="str">'admin'</span>]), ...);
app.<span class="fn">post</span>(<span class="str">'/materiales'</span>, authMiddleware([<span class="str">'admin'</span>,<span class="str">'almacen'</span>]), ...);
app.<span class="fn">post</span>(<span class="str">'/movimientos'</span>, authMiddleware([<span class="str">'admin'</span>,<span class="str">'almacen'</span>,<span class="str">'ventas'</span>]), ...
);</pre>
      <div class="explanation"><strong>¿Qué hace?</strong> Cada ruta de la API declara qué roles pueden acceder. El middleware verifica el token JWT (expira en 12h), busca el usuario en la BD, y comprueba si tiene el rol adecuado. Si no tiene permisos, responde con 403 Forbidden. Esto garantiza que un vendedor no pueda eliminar materiales ni un usuario de almacén gestionar usuarios. <strong>Archivo real:</strong> backend/server.js líneas 177-195.</div>
    </div>
    <div class="card">
      <h3>🔐 bcrypt - Hash de Contraseñas <span class="badge badge-implemented">✅ CÓDIGO REAL</span></h3>
      <p><code>backend/server.js</code> - Contraseñas protegidas con 10 rondas de sal</p>
      <pre><span class="kw">const</span> bcrypt = <span class="fn">require</span>(<span class="str">'bcryptjs'</span>);
<span class="cm">// Al crear usuario: hash con 10 rondas</span>
<span class="kw">const</span> hashed = bcrypt.<span class="fn">hashSync</span>(password, 10);
db.<span class="fn">run</span>(<span class="str">'INSERT INTO usuarios VALUES (NULL,?,?,?,?,1)'</span>,
  [username, hashed, nombre, rol]);
<span class="cm">// Al iniciar sesión: comparar hash</span>
bcrypt.<span class="fn">compareSync</span>(password, user.password);</pre>
      <div class="explanation"><strong>¿Qué hace?</strong> Nunca almacena contraseñas en texto plano. Usa bcrypt con 10 rondas de sal, lo que hace que cada verificación tome ~100ms. Si un atacante obtiene la BD, no puede recuperar las contraseñas originales. Cada contraseña requiere su propio cálculo, haciendo inviable un ataque de fuerza bruta incluso con GPUs. <strong>Archivo real:</strong> backend/server.js líneas 365-371.</div>
    </div>
    <div class="card">
      <h3>📦 Validación + Límite de tamaño <span class="badge badge-implemented">✅ CÓDIGO REAL</span></h3>
      <p><code>backend/server.js</code> - Protección contra DoS e inyección de datos</p>
      <pre><span class="cm">// Límite de tamaño del body: 1MB máximo</span>
app.<span class="fn">use</span>(express.json({ limit: <span class="str">'1mb'</span> }));
<span class="cm">// Validación estricta de tipos en login</span>
<span class="kw">if</span> (<span class="kw">typeof</span> username !== <span class="str">'string'</span> || <span class="kw">typeof</span> password !== <span class="str">'string'</span>)
  <span class="kw">return</span> res.<span class="fn">status</span>(400).<span class="fn">json</span>({error:<span class="str">'Datos inválidos'</span>});
<span class="cm">// Validación de campos obligatorios</span>
<span class="kw">if</span> (!username || !password || !nombre || !rol)
  <span class="kw">return</span> res.<span class="fn">status</span>(400).<span class="fn">json</span>({error:<span class="str">'Campos requeridos'</span>});
<span class="cm">// Validación de rol contra lista blanca</span>
<span class="kw">if</span> (![<span class="str">'admin'</span>,<span class="str">'almacen'</span>,<span class="str">'ventas'</span>].<span class="fn">includes</span>(rol))
  <span class="kw">return</span> res.<span class="fn">status</span>(400).<span class="fn">json</span>({error:<span class="str">'Rol inválido'</span>});</pre>
      <div class="explanation"><strong>¿Qué hace?</strong> Tres capas de validación: 1) Límite de 1MB en el body para evitar ataques DoS por payloads enormes. 2) Validación de tipos (typeof) para evitar inyección de objetos maliciosos. 3) Lista blanca de roles permitidos, rechazando cualquier valor no esperado. <strong>Archivo real:</strong> backend/server.js líneas 45-55.</div>
    </div>
  </div>
</section>

  <h2>🔒 DevSecOps - Seguridad en el Pipeline</h2>
  <p class="slide-subtitle">Husky (pre-commit hooks), Gitleaks (detección de secretos), escaneos automáticos con Ansible, hardening del servidor con Ansible</p>

      <h3>🐶 Husky + lint-staged <span class="badge badge-implemented">✅ CÓDIGO REAL</span></h3>
      <p><code>.husky/pre-commit</code> y <code>package.json</code> - Calidad y seguridad antes de cada commit</p>
      <pre><span class="cm"># .husky/pre-commit - Se ejecuta automáticamente antes</span>
<span class="cm"># de cada "git commit"</span>
npx lint-staged
npx --yes gitleaks detect --source . --no-git --verbose

<span class="cm"># package.json - lint-staged formatea y corrige</span>
"lint-staged": {

}</pre>
      <div class="explanation"><strong>¿Qué hace y cómo funciona?</strong> Husky es una herramienta que ejecuta scripts antes de ciertos eventos de Git. En este proyecto, antes de cada commit: 1) lint-staged ejecuta Prettier para formatear automáticamente el código (TypeScript, JavaScript, JSON, CSS, HTML) y ESLint para corregir errores. 2) Gitleaks escanea todo el código en busca de secretos (tokens, contraseñas, claves). Si encuentra algo, aborta el commit. <strong>Archivo real:</strong> .husky/pre-commit y package.json líneas 12-18.</div>
    </div>
    <div class="card">
      <h3>🔍 Gitleaks - Detector de Secretos <span class="badge badge-implemented">✅ IMPLEMENTADO</span></h3>
      <p><code>.husky/pre-commit</code> - Previene fugas de información sensible</p>
      <pre><span class="cm"># Gitleaks busca patrones de secretos como:</span>
<span class="cm"># - AWS Access Key ID (AKIA...)</span>
<span class="cm"># - GitHub Personal Access Tokens (ghp_...)</span>
<span class="cm"># - Claves privadas RSA/SSH (-----BEGIN RSA PRIVATE KEY-----)</span>
<span class="cm"># - Tokens de API (slack, stripe, etc.)</span>
<span class="cm"># - URLs de conexión a BD con credenciales</span>
npx --yes gitleaks detect --source . --no-git --verbose
<span class="cm"># Si encuentra algún secreto → ERROR → commit bloqueado</span>
<span class="cm"># Si no encuentra nada → OK → commit procede normalmente</span></pre>
      <div class="explanation"><strong>¿Por qué es crítico?</strong> Un solo commit con una clave AWS expuesta puede comprometer toda la infraestructura. Gitleaks analiza el código contra una base de datos de más de 150 patrones de secretos conocidos. Detecta automáticamente tokens de AWS, GitHub, Google Cloud, claves SSH, URLs de conexión, y más. Si encuentra algo sospechoso, bloquea el commit inmediatamente. Es la primera línea de defensa contra fugas de credenciales.</div>
    </div>

      <p><code>ansible/devsecops/scan.yml</code> - Pipeline completo de 5 herramientas de seguridad</p>
      <pre><span class="cm"># 1. npm audit - Vulnerabilidades en dependencias Node.js</span>
- <span class="kw">command</span>: npm audit --audit-level=high
  <span class="kw">register</span>: npm_audit_backend
<span class="cm"># 2. Trivy - Escaneo de archivos y sistemas de archivos</span>
- <span class="kw">command</span>: trivy fs --severity HIGH,CRITICAL {{ app_root }}
<span class="cm"># 3. Checkov - Escaneo de playbooks y roles Ansible</span>
- <span class="kw">command</span>: checkov --directory {{ app_root }}/ansible
<span class="cm"># 4. SonarQube - Análisis de calidad y seguridad de código</span>
- <span class="kw">command</span>: sonar-scanner
<span class="cm"># 5. Snyk - Monitoreo continuo de vulnerabilidades</span>
- <span class="kw">command</span>: snyk test --all-projects
<span class="cm"># Todos los resultados se guardan en /var/log/ckj/scans/</span>
- <span class="kw">copy</span>: content={{ resultado }} dest=/var/log/ckj/scans/</pre>
      <div class="explanation"><strong>¿Qué hace cada herramienta?</strong> 1) npm audit revisa vulnerabilidades en paquetes npm (express, bcrypt, etc.). 2) Trivy escanea archivos en busca de configuraciones inseguras, contraseñas hardcodeadas y vulnerabilidades conocidas. 3) Checkov analiza los playbooks de Ansible para detectar configuraciones inseguras. 4) SonarQube mide la calidad del código y detecta bugs, vulnerabilidades y code smells. 5) Snyk monitorea continuamente las dependencias y alerta sobre nuevas vulnerabilidades. <strong>Archivo real:</strong> ansible/devsecops/scan.yml.</div>
    </div>
    <div class="card">
      <h3>🔒 Hardening del Servidor con Ansible <span class="badge badge-implemented">✅ CÓDIGO REAL</span></h3>
      <p><code>ansible/roles/security/tasks/main.yml</code> - Configuración completa de seguridad del servidor</p>
      <pre><span class="cm"># Fail2Ban: bloquea IPs tras 3 intentos fallidos SSH</span>
- apt: name=fail2ban state=present
<span class="cm"># UFW: firewall - denegar todo, permitir solo lo necesario</span>
- ufw: rule=allow port=22  proto=tcp  <span class="cm"># SSH</span>
- ufw: rule=allow port=80  proto=tcp  <span class="cm"># HTTP</span>
- ufw: rule=allow port=443 proto=tcp  <span class="cm"># HTTPS</span>
- ufw: rule=deny  port=3000 proto=tcp  <span class="cm"># API no expuesta</span>
- ufw: state=enabled direction=incoming policy=deny
<span class="cm"># Hardening SSH: eliminar accesos inseguros</span>
- lineinfile: line='PermitRootLogin no'
- lineinfile: line='PasswordAuthentication no'
- lineinfile: line='MaxAuthTries 3'
<span class="cm"># Actualizaciones automáticas de seguridad</span>
- apt: name=unattended-upgrades state=present</pre>
      <div class="explanation"><strong>¿Qué hace?</strong> Fail2Ban monitorea los logs de SSH y bloquea IPs tras 3 intentos fallidos (baneo configurable). UFW configura un firewall con política "denegar todo por defecto", abriendo solo los puertos 22 (SSH), 80 (HTTP) y 443 (HTTPS). El puerto 3000 de la API Express no está expuesto directamente (solo a través de Nginx). SSH se protege desactivando login root, exigiendo autenticación por clave pública (no contraseña) y limitando a 3 intentos máximos. Las actualizaciones de seguridad se instalan automáticamente. <strong>Archivo real:</strong> ansible/roles/security/tasks/main.yml.</div>

<section class="slide slide-content">

  <p class="slide-subtitle">Mecanismos de auto-recuperación con código real del proyecto</p>

      <h3>📊 PM2 - Process Manager <span class="badge badge-implemented">✅ CÓDIGO REAL</span></h3>
      <p><code>ansible/roles/app/tasks/main.yml</code> - Gestión de procesos con auto-recuperación</p>
      <pre><span class="cm"># PM2: Process Manager con múltiples protecciones</span>
pm2 start {{ backend_dir }}/server.js \
  --name ckj-api \
  --watch                         <span class="cm"># Reinicia si cambia el código</span>
  --ignore-watch="*.sqlite"       <span class="cm"># No reinicia por cambios en BD</span>
  --max-memory-restart 300M       <span class="cm"># Reinicia si excede 300MB RAM</span>

<span class="cm"># Inicio automático al encender el servidor</span>
pm2 startup systemd               <span class="cm"># Crea servicio systemd</span>
pm2 save                          <span class="cm"># Persiste la configuración</span></pre>
      <div class="explanation"><strong>¿Cómo funciona en CKJ?</strong> PM2 mantiene el proceso del backend siempre vivo. Si el proceso se cae por error, memory leak, o cualquier motivo, PM2 lo reinicia automáticamente en menos de 2 segundos. El modo watch detecta cambios en el código y reinicia la app sin intervención manual (útil en desarrollo). Si el servidor entero se reinicia (corte de luz, mantenimiento), PM2 startup systemd asegura que la app arranque automáticamente al iniciar el sistema. El límite de 300MB evita que un memory leak consuma toda la RAM del servidor. <strong>Archivo real:</strong> ansible/roles/app/tasks/main.yml líneas 42-56.</div>
    </div>
    <div class="card">
      <h3>🐳 Docker - Aislamiento + Auto-reinicio <span class="badge badge-implemented">✅ CÓDIGO REAL</span></h3>
      <p><code>Dockerfile</code> - Multi-stage build para imagen mínima y segura</p>
      <pre><span class="cm"># Dockerfile - Construcción en 3 etapas</span>
FROM node:22-alpine AS build-frontend
WORKDIR /app
COPY package*.json ./; RUN npm ci --only=production
COPY . .; RUN npm run build -- --configuration production

FROM node:22-alpine AS build-backend
WORKDIR /app
COPY backend/package*.json ./backend/
RUN cd backend && npm ci --only=production
COPY backend/ ./backend/

FROM node:22-alpine  <span class="cm"># Imagen final: solo lo necesario</span>
RUN apk add --no-cache tini  <span class="cm"># Manejo correcto de SIGTERM</span>
RUN addgroup -S ckj && adduser -S ckj -G ckj
USER ckj                     <span class="cm"># Ejecutar como no-root</span>
EXPOSE 3000
ENTRYPOINT ["/sbin/tini", "--"]
CMD ["node", "backend/server.js"]

<span class="cm"># docker run -d -p 3000:3000 --restart always ckj:latest</span></pre>
      <div class="explanation"><strong>¿Por qué multi-stage?</strong> La imagen final solo contiene lo necesario para ejecutar la app, reduciendo el tamaño de ~1.5GB a ~300MB. Beneficios: despliegues más rápidos, menor superficie de ataque, menos vulnerabilidades. El flag --restart always hace que Docker reinicie automáticamente el contenedor si se cae. Tini como entrypoint maneja correctamente las señales SIGTERM y SIGINT para hacer un shutdown graceful. El usuario no-root (ckj) limita los permisos del contenedor. <strong>Archivo real:</strong> Dockerfile (raíz del proyecto).</div>
    </div>
    <div class="card" style="grid-column:1/3;">
      <h3>⏪ Ansible Rollback + Nginx Failover <span class="badge badge-implemented">✅ CÓDIGO REAL</span></h3>
      <p><code>ansible/rollback.yml</code> y <code>ansible/roles/nginx/</code> - Recuperación ante fallos de código y red</p>
      <div class="two-col" style="grid-template-columns:1fr 1fr;gap:12px;">
        <pre style="margin:0;"><span class="cm"># rollback.yml - Recuperación en &lt;2 minutos</span>
ansible-playbook rollback.yml -e "git_ref=v1.0.0"

<span class="cm"># El playbook ejecuta automáticamente:</span>
<span class="cm"># 1. Git checkout a versión estable</span>
<span class="cm"># 2. Reinstala dependencias (npm ci)</span>
<span class="cm"># 3. Recompila Angular (ng build --prod)</span>
<span class="cm"># 4. pm2 restart ckj-api</span>
<span class="cm"># Tiempo total de recuperación: &lt; 2 minutos</span></pre>
        <pre style="margin:0;"><span class="cm"># nginx - Caché de archivos estáticos (1 año)</span>
location / {
  try_files $uri $uri/ /index.html;
  expires 1y;
  add_header Cache-Control "public, immutable";
}
<span class="cm"># Bloquear acceso a rutas sensibles</span>
location ~ /\. { deny all; }
location ~ /(node_modules|\.git|src) { deny all; return 404; }</pre>
      </div>
      <div class="explanation"><strong>¿Cómo funciona?</strong> Si una actualización introduce un bug crítico, se ejecuta el playbook rollback.yml que revierte el código a una versión anterior estable en menos de 2 minutos. Nginx añade resiliencia a nivel de red: cachea los archivos estáticos del frontend por 1 año (si el backend falla, los usuarios siguen viendo la página), y bloquea el acceso a rutas sensibles como .git o node_modules. <strong>Archivos reales:</strong> ansible/rollback.yml y ansible/roles/nginx/templates/ckj.nginx.conf.j2.</div>
    </div>
  </div>

  <p class="section-desc">La contingencia es el conjunto de planes y procedimientos para recuperar el sistema ante un desastre. Puede ser pérdida de datos, caída del servidor, ataque cibernético o error humano. Un buen plan de contingencia minimiza dos métricas clave: RTO (Recovery Time Objective - cuánto tardamos en recuperar) y RPO (Recovery Point Objective - cuántos datos perdemos).</p>
</section>

<!-- SLIDE 11: CONTINGENCIA - IMPLEMENTADO -->
<section class="slide slide-content">
  <h2>📋 Contingencia Implementada en CKJ</h2>
  <p class="slide-subtitle">Medidas de protección, backup continuo y planes de recuperación</p>
  <div class="two-col">
    <div class="card">
      <h3>💾 Persistencia Inmediata (Backup continuo) <span class="badge badge-implemented">✅ CÓDIGO REAL</span></h3>
      <p><code>backend/server.js</code> - Cada operación se guarda al instante en disco</p>
      <pre><span class="kw">function</span> <span class="fn">saveDb</span>() {
  <span class="cm">// Exporta TODA la base de datos a disco</span>
  <span class="kw">const</span> data = db.<span class="fn">export</span>();
  fs.<span class="fn">writeFileSync</span>(DB_PATH, Buffer.<span class="fn">from</span>(data));
}
<span class="kw">function</span> <span class="fn">runSql</span>(sql, params = []) {
  db.<span class="fn">run</span>(sql, params);
  <span class="fn">saveDb</span>(); <span class="cm">// ¡Persistencia en CADA operación!</span>
}</pre>
      <div class="explanation"><strong>¿Qué hace?</strong> Cada INSERT, UPDATE o DELETE ejecuta saveDb(), que exporta toda la base de datos al archivo database.sqlite. Esto significa que incluso si el servidor se apaga inesperadamente (corte de luz), solo se pierde la operación en curso, no datos acumulados. Es un backup continuo en tiempo real. El archivo database.sqlite puede ser respaldado externamente con una simple copia (cp, rsync, S3 sync). <strong>Archivo real:</strong> backend/server.js líneas 60-68.</div>
    </div>
    <div class="card">
      <h3>🛡️ Rate Limiting (Anti-DoS) <span class="badge badge-implemented">✅ CÓDIGO REAL</span></h3>
      <p><code>backend/server.js</code> - Protección contra ataques de denegación de servicio</p>
      <pre><span class="cm">// Límite general: 100 peticiones cada 15 minutos por IP</span>
<span class="kw">const</span> limiter = rateLimit({
  windowMs: 15 * 60 * 1000, max: 100,
  standardHeaders: true, legacyHeaders: false,
  message: { error: <span class="str">'Demasiadas solicitudes. Espere 15 min.'</span> }
});
app.<span class="fn">use</span>(<span class="str">'/api/'</span>, limiter);
<span class="cm">// Límite estricto para login: solo 5 intentos cada 15 min</span>
<span class="kw">const</span> loginLimiter = rateLimit({
  windowMs: 15 * 60 * 1000, max: 5,
  message: { error: <span class="str">'Demasiados intentos. Espere 15 min.'</span> }
});
app.<span class="fn">post</span>(<span class="str">'/api/login'</span>, loginLimiter, ...);</pre>
      <div class="explanation"><strong>¿Qué hace?</strong> Protege contra ataques DoS limitando el número de peticiones por IP en 15 minutos. Si un atacante intenta saturar la API, el sistema responde con error 429 y bloquea temporalmente a esa IP. El login tiene un límite aún más restrictivo (5 intentos) para prevenir ataques de fuerza bruta. Las cabeceras estándar (RateLimit-Limit, RateLimit-Remaining) informan al cliente sobre su límite actual. <strong>Archivo real:</strong> backend/server.js líneas 40-55.</div>
    </div>
    <div class="card">
      <h3>🔒 Hardening Preventivo (Firewall + SSH) <span class="badge badge-implemented">✅ CÓDIGO REAL</span></h3>
      <p><code>ansible/roles/security/</code> - Configuración preventiva de seguridad del servidor</p>
      <pre><span class="cm"># UFW: Política "denegar todo por defecto"</span>
- ufw: state=enabled direction=incoming policy=deny
<span class="cm"># Solo permitir puertos esenciales:</span>
- { rule: allow, port: '22', proto: 'tcp' }   <span class="cm"># SSH</span>
- { rule: allow, port: '80', proto: 'tcp' }   <span class="cm"># HTTP</span>
- { rule: allow, port: '443', proto: 'tcp' }  <span class="cm"># HTTPS</span>
- { rule: deny,  port: '3000', proto: 'tcp' } <span class="cm"># API oculta</span>

<span class="cm"># SSH Hardening</span>
PermitRootLogin no                             <span class="cm"># No root</span>
PasswordAuthentication no                      <span class="cm"># Solo claves</span>
MaxAuthTries 3                                 <span class="cm"># 3 intentos</span>

<span class="cm"># Fail2Ban - Bloqueo automático</span>
[sshd]
enabled = true; maxretry = 3; bantime = 3600</pre>
      <div class="explanation"><strong>¿Qué hace?</strong> Principio de "denegar todo por defecto, permitir solo lo necesario". UFW bloquea todo el tráfico entrante excepto SSH (22), HTTP (80) y HTTPS (443). La API en puerto 3000 no está expuesta (solo a través de Nginx). SSH se protege desactivando login root, exigiendo claves públicas (no contraseñas) y limitando a 3 intentos. Fail2Ban bloquea IPs que fallen 3 intentos SSH durante 1 hora. <strong>Archivo real:</strong> ansible/roles/security/tasks/main.yml.</div>
    </div>
    <div class="card">
      <h3>⏪ Rollback (Recuperación ante fallos) <span class="badge badge-implemented">✅ CÓDIGO REAL</span></h3>
      <p><code>ansible/rollback.yml</code> - Plan de contingencia para recuperación de código</p>
      <pre><span class="cm"># Plan: ¿Qué hago si la nueva versión tiene un bug crítico?</span>
<span class="cm"># Paso 1: Ejecutar rollback a versión estable</span>
ansible-playbook rollback.yml -e "git_ref=v1.0.0"

<span class="cm"># El playbook ejecuta automáticamente:</span>
- git checkout {{ git_ref }}    <span class="cm"># Volver a código anterior</span>
- npm ci                        <span class="cm"># Reinstalar dependencias</span>
- npm run build -- --prod       <span class="cm"># Recompilar frontend Angular</span>
- pm2 restart ckj-api           <span class="cm"># Reiniciar backend</span>
<span class="cm"># Tiempo total de recuperación: &lt; 2 minutos</span>

<span class="cm"># Paso 3: Verificar que todo funciona</span>
ansible-playbook status.yml</pre>
      <div class="explanation"><strong>¿Qué hace?</strong> Permite revertir a una versión anterior del código en menos de 2 minutos. Es el plan de recuperación principal ante un bug crítico en producción. El flujo es automático: especificas la versión estable (git tag o commit) y Ansible ejecuta checkout, reinstala dependencias, recompila Angular y reinicia el backend. El playbook status.yml verifica que la recuperación fue exitosa consultando PM2 y Nginx. <strong>Archivo real:</strong> ansible/rollback.yml.</div>
    </div>
  </div>
</section>

  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') wrapper.scrollBy({ left: wrapper.clientWidth, behavior: 'smooth' });
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') wrapper.scrollBy({ left: -wrapper.clientWidth, behavior: 'smooth' });
});
updateNav();
</script>

</body>
</html>
