# ============================================
# sonar-project.properties
# Configuración de SonarQube para CKJ
# ============================================
# Uso: sonar-scanner
# Requiere: SonarQube instalado (local o cloud)
# ============================================

sonar.projectKey=ckj-almacen
sonar.projectName=CKJ - Sistema de Almacén
sonar.projectVersion=1.0.0

# Directorios fuente
sonar.sources=src,backend
sonar.tests=src

# Lenguajes
sonar.language=ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Excluir lo que no se analiza
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/*.test.ts,backend/database.sqlite,backend/uploads/**

# Reglas de calidad
sonar.qualitygate.wait=true

# Métricas
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts

# Análisis de seguridad
sonar.security.owasp.enabled=true
sonar.security.safety.enabled=true
